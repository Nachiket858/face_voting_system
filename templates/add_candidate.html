<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Candidate</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center items-center min-h-screen">

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-lg">
        <!-- Header -->
        <h1 class="text-3xl font-semibold text-center text-gray-800 mb-6">Add Candidate</h1>

        <form method="POST" class="space-y-6">
            <!-- Candidate Name -->
            <div>
                <label for="name" class="block text-lg font-medium text-gray-700 mb-2">Candidate Name</label>
                <input type="text" id="name" name="name" required 
                    class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-400">
            </div>

            <!-- Candidate Party -->
            <div>
                <label for="party" class="block text-lg font-medium text-gray-700 mb-2">Candidate Party</label>
                <input type="text" id="party" name="party" required 
                    class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-400">
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition">
                Add Candidate
            </button>
        </form>

        <!-- Back to Dashboard -->
        <div class="mt-4 text-center">
            <a href="/admin/dashboard" class="text-blue-600 hover:underline">⬅️ Back to Dashboard</a>
        </div>
    </div>

</body>
</html>
