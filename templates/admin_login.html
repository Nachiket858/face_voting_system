<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="flex items-center justify-center min-h-screen bg-gradient-to-r from-blue-500 to-indigo-600">

    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md text-center">
        <!-- Admin Icon -->
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Admin Icon" class="w-20 mx-auto mb-4">

        <h1 class="text-2xl font-bold text-gray-800">Admin Login</h1>
        <p class="text-gray-600 mt-2">Secure access to manage elections and verify voters.</p>

        <form action="/admin/login" method="POST" class="mt-6 space-y-4">
            <input type="email" name="email" placeholder="Enter email" required 
                class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">

            <input type="password" name="password" placeholder="Enter password" required 
                class="w-full px-4 py-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">

            <button type="submit" 
                class="w-full bg-blue-500 text-white py-3 rounded-lg text-lg font-semibold hover:bg-blue-600 transition">
                🔑 Login
            </button>
        </form>

        <p class="text-gray-500 text-sm mt-4">Forgot password? <a href="#" class="text-blue-500 hover:underline">Reset here</a></p>
    </div>

</body>
</html>
