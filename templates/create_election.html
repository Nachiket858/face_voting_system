<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Election</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

    <!-- Navigation Bar -->
    <nav class="bg-blue-600 text-white py-4 px-6 flex justify-between">
        <h1 class="text-2xl font-bold">Admin Panel</h1>
        <a href="/admin/dashboard" class="text-lg hover:underline">Dashboard</a>
    </nav>

    <!-- Main Container -->
    <div class="flex justify-center items-center min-h-screen">
        <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-2xl">
            <h2 class="text-3xl font-semibold text-center text-gray-800 mb-6">Create New Election</h2>

            <form action="/admin/create_election" method="POST" class="space-y-6" onsubmit="formatDateInputs()">
                <!-- Election Name -->
                <div>
                    <label class="block text-gray-700 font-medium mb-2">Election Name</label>
                    <input type="text" name="name" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-400">
                </div>

                <!-- Region -->
                <div>
                    <label class="block text-gray-700 font-medium mb-2">Region</label>
                    <input type="text" name="region" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-400">
                </div>

                <!-- Start Time -->
                <div>
                    <label class="block text-gray-700 font-medium mb-2">Start Time (YYYY-MM-DD HH:MM)</label>
                    <input type="datetime-local" id="start_time" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-400">
                    <input type="hidden" name="start_time" id="formatted_start_time"> <!-- Hidden Input -->
                </div>

                <!-- End Time -->
                <div>
                    <label class="block text-gray-700 font-medium mb-2">End Time (YYYY-MM-DD HH:MM)</label>
                    <input type="datetime-local" id="end_time" required class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-blue-400">
                    <input type="hidden" name="end_time" id="formatted_end_time"> <!-- Hidden Input -->
                </div>

                <!-- Submit Button -->
                <button type="submit" class="w-full bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition">
                    Create Election
                </button>
            </form>
        </div>
    </div>

    <!-- JavaScript to Fix Date Format -->
    <script>
        function formatDateTime(dateTimeStr) {
            // Convert "YYYY-MM-DDTHH:MM" to "YYYY-MM-DD HH:MM"
            return dateTimeStr.replace("T", " ");
        }

        function formatDateInputs() {
            let startInput = document.getElementById("start_time").value;
            let endInput = document.getElementById("end_time").value;

            document.getElementById("formatted_start_time").value = formatDateTime(startInput);
            document.getElementById("formatted_end_time").value = formatDateTime(endInput);
        }
    </script>

</body>
</html>
