 <!DOCTYPE html>
 <html lang="en">
 <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Vote</title>
     <script src="https://cdn.tailwindcss.com"></script>
     <script>
         function captureFace() {
             const video = document.getElementById('video');
             const canvas = document.createElement('canvas');
             canvas.width = video.videoWidth;
             canvas.height = video.videoHeight;
             const ctx = canvas.getContext('2d');
             ctx.drawImage(video, 0, 0);
             document.getElementById('face_data').value = canvas.toDataURL('image/jpeg');
         }
     </script>
 </head>
 <body class="bg-gray-100 h-screen flex flex-col">
     <!-- Navbar -->
     <nav class="bg-blue-700 text-white py-4 px-6 shadow-md">
         <div class="max-w-6xl mx-auto flex justify-between items-center">
             <h1 class="text-2xl font-bold">Voting System</h1>
             <div class="flex items-center space-x-4">
                 <span class="text-lg font-semibold">{{ voter_name }}</span>
                 <a href="{{ url_for('voter_bp.logout') }}" class="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700">Logout</a>
             </div>
         </div>
     </nav>
     
     <!-- Main Content -->
     <main class="flex-grow flex justify-center items-center p-8">
         <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-4xl">
             <h2 class="text-3xl font-semibold text-center text-gray-800 mb-8">Vote for {{ election.name }}</h2>
             
             <!-- Voting Form -->
             <form method="POST" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                 <!-- Candidate Selection -->
                 <div class="bg-gray-50 p-6 rounded-lg border border-gray-200">
                     <label class="block text-lg font-medium text-gray-700 mb-4">Select Candidate:</label>
                     <div class="space-y-4">
                         {% for candidate in candidates %}
                         <div class="flex items-center space-x-4 bg-white p-4 rounded-lg border border-gray-200 hover:bg-gray-100 transition">
                             <input type="radio" name="candidate" value="{{ candidate }}" required class="w-5 h-5 text-blue-600">
                             <span class="text-gray-800 text-lg font-medium">{{ candidate }}</span>
                         </div>
                         {% endfor %}
                     </div>
                 </div>
                 
                 <!-- Face Verification -->
                 <div class="bg-gray-50 p-6 rounded-lg border border-gray-200 flex flex-col items-center">
                     <label class="block text-lg font-medium text-gray-700 mb-4">Face Verification:</label>
                     <video id="video" autoplay class="border-2 border-gray-300 rounded-lg w-full h-48 mb-4"></video>
                     <input type="hidden" name="face_data" id="face_data">
                     <button type="button" onclick="captureFace()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">
                         Capture Face
                     </button>
                 </div>
                 
                 <!-- Submit Button -->
                 <div class="col-span-1 md:col-span-2 flex justify-center">
                     <button type="submit" class="w-full bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transition">
                         Submit Vote
                     </button>
                 </div>
             </form>
             
             <!-- Back to Dashboard Link -->
             <div class="mt-6 text-center">
                 <a href="{{ url_for('voter_bp.dashboard') }}" class="text-blue-600 hover:underline">Back to Dashboard</a>
             </div>
         </div>
     </main>
     
     <script>
         navigator.mediaDevices.getUserMedia({ video: true })
             .then(stream => { document.getElementById('video').srcObject = stream; })
             .catch(err => { console.error("Error accessing webcam:", err); });
     </script>
 </body>
 </html>
